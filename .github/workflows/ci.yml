name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test]

      - name: Run tests
        run: python -m pytest tests/ -v --cov=onebatch --cov-report=json

      - name: Smoke test
        run: |
          python -c "
          import numpy as np
          from onebatch import OneBatchPAM
          X = np.random.RandomState(0).randn(100, 4).astype(np.float32)
          model = OneBatchPAM(n_medoids=3, random_state=0)
          model.fit(X)
          print('Medoids:', model.medoid_indices_)
          print('Inertia:', model.inertia_)
          print('Success!')
          "

      - name: Update coverage badge
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          COV=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered_display']))")
          if [ "$COV" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$COV" -ge 75 ]; then COLOR="green"
          elif [ "$COV" -ge 60 ]; then COLOR="yellow"
          else COLOR="red"; fi
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COV}%\",\"color\":\"${COLOR}\"}" > badge.json
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/gists/01dad95f50cdf5bf6b6f5da6865fc07e \
            -d "{\"files\":{\"coverage.json\":{\"content\":$(python -c "import json; print(json.dumps(open('badge.json').read()))")}}}"
